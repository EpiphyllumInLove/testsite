<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>妖精之里 - 反馈</title>
<link rel="icon" href="https://loli.yousei.top">
<script>document.querySelector('link[rel="icon"]').href = 'https://loli.yousei.top?t=' + Date.now()</script>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="page-feedback">
    <!-- 顶部导航栏 -->
    <header class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="/">花林妖精个人网站</a>
            </div>
            <nav class="nav-links">
                <a href="/">介绍</a>
                <a href="/works.html">作品</a>
                <a href="/feedback.html" class="active">反馈</a>
            </nav>
            <button class="nav-toggle" onclick="toggleMenu()">☰</button>
        </div>
    </header>

    <!-- 主内容 -->
    <main class="container">
        <div class="feedback-section">
            <div class="feedback-card">
                <h1>提交反馈</h1>
                <p class="subtitle">发现汉化问题或有建议？请填写下方表单，我会尽快处理。</p>

                <form id="feedback-form">
                    <div class="form-group">
                        <label for="feedback-type">反馈类型 <span class="required">*</span></label>
                        <select id="feedback-type" required>
                            <option value="">请选择反馈类型</option>
                            <option value="bug">汉化错误 / BUG</option>
                            <option value="suggestion">功能建议</option>
                            <option value="request">作品请求</option>
                            <option value="link">下载链接失效</option>
                            <option value="other">其他</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="feedback-title">标题 <span class="required">*</span></label>
                        <input type="text" id="feedback-title" placeholder="简要描述你的问题或建议" required maxlength="100">
                    </div>

                    <div class="form-group">
                        <label for="feedback-content">详细内容 <span class="required">*</span></label>
                        <textarea id="feedback-content" placeholder="请详细描述你遇到的问题或建议..." required maxlength="5000"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="feedback-contact">联系方式 <span class="hint">（选填，方便我回复你）</span></label>
                        <input type="text" id="feedback-contact" placeholder="邮箱 / Telegram / QQ 等" maxlength="200">
                    </div>

                    <button type="submit" class="submit-btn">提交反馈</button>
                    <div id="form-message" class="form-message"></div>
                </form>

                <!-- 降级备用提交（Worker 失败时显示） -->
                <div id="fallback-section" style="display: none; margin-top: 25px; padding-top: 20px; border-top: 2px solid #ff9800;">
                    <h3 style="margin: 0 0 10px; font-size: 1.1rem;">🔄 备用提交方式</h3>
                    <p style="color: #666; font-size: 0.9rem; margin-bottom: 12px;">
                        由于网络原因，无法直接连接提交服务器。请复制下方内容，手动提交：
                    </p>

                    <div style="margin-bottom: 10px;">
                        <textarea id="fallback-text" readonly rows="5" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.85rem; resize: vertical; box-sizing: border-box; background: #f9f9f9;"></textarea>
                        <button type="button" onclick="copyFallbackText()" style="margin-top: 8px; padding: 6px 18px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem;">📋 复制内容到剪贴板</button>
                        <span id="copy-tip" style="margin-left: 10px; color: #4caf50; font-size: 0.8rem; display: none;">✓ 已复制！</span>
                    </div>
                </div>

                <div style="margin-top: 22px; padding-top: 16px; border-top: 1px solid #f0f0f0;">
                    <p style="color: #888; font-size: 0.85rem;">
                        💡 反馈将通过 GitHub Issues 提交到仓库。你也可以直接访问 
                        <a id="issues-link" href="#" target="_blank" style="color: #667eea;">GitHub Issues 页面</a> 提交。
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 花林妖精个人汉化 | 网站为花林妖精所有</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script>
        function toggleMenu() {
            document.querySelector('.nav-links').classList.toggle('show');
        }

        function copyFallbackText() {
            const textarea = document.getElementById('fallback-text');
            textarea.select();
            textarea.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(textarea.value).then(() => {
                const tip = document.getElementById('copy-tip');
                tip.style.display = 'inline';
                setTimeout(() => { tip.style.display = 'none'; }, 2000);
            }).catch(() => {
                document.execCommand('copy');
                const tip = document.getElementById('copy-tip');
                tip.style.display = 'inline';
                setTimeout(() => { tip.style.display = 'none'; }, 2000);
            });
        }

        // 页面加载：更新 Issues 链接
        document.addEventListener('DOMContentLoaded', function() {
            const issuesLink = document.getElementById('issues-link');
            issuesLink.href = API.getIssuesUrl();
        });

        // 反馈表单提交
        const form = document.getElementById('feedback-form');
        if (form) {
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const submitBtn = form.querySelector('.submit-btn');
                const messageDiv = document.getElementById('form-message');
                const fallbackSection = document.getElementById('fallback-section');

                submitBtn.disabled = true;
                submitBtn.textContent = '提交中...';
                messageDiv.className = 'form-message';
                messageDiv.style.display = 'none';
                fallbackSection.style.display = 'none';

                const formData = {
                    type: document.getElementById('feedback-type').value,
                    title: document.getElementById('feedback-title').value.trim(),
                    content: document.getElementById('feedback-content').value.trim(),
                    contact: document.getElementById('feedback-contact').value.trim(),
                    timestamp: new Date().toISOString()
                };

                try {
                    const result = await API.submitFeedback(formData);

                    if (result.success) {
                        messageDiv.className = 'form-message success';
                        messageDiv.textContent = '✅ 反馈已成功提交到 GitHub Issues，感谢您的支持！';
                        if (result.html_url) {
                            messageDiv.innerHTML += '<br><a href="' + result.html_url + '" target="_blank" style="color:#fff;text-decoration:underline;">查看你的 Issue</a>';
                        }
                        messageDiv.style.display = 'block';
                        form.reset();
                    } else if (result.fallback) {
                        messageDiv.className = 'form-message warning';
                        messageDiv.textContent = result.error || '无法直接提交，请使用下方备用方式手动提交。';
                        messageDiv.style.display = 'block';

                        document.getElementById('fallback-text').value = result.copyText;
                        fallbackSection.style.display = 'block';
                    } else {
                        throw new Error(result.error || '提交失败');
                    }
                } catch (err) {
                    messageDiv.className = 'form-message error';
                    messageDiv.textContent = '❌ 提交失败：' + err.message;
                    messageDiv.style.display = 'block';
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = '提交反馈';
                }
            });
        }
    </script>
</body>
</html>
